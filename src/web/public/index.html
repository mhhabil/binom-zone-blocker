<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binom Zone Blocker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
    }

    header p {
      margin-top: 0.25rem;
      font-size: 0.875rem;
      color: #94a3b8;
    }

    .card {
      background: #1e2433;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }

    .card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #64748b;
      margin-bottom: 1rem;
    }

    .add-form {
      display: flex;
      gap: 0.5rem;
    }

    .add-form input {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 0.55rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-form input:focus {
      border-color: #3b82f6;
    }

    .add-form input::placeholder { color: #475569; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.55rem 1rem;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }

    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-danger {
      background: transparent;
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 0.3rem 0.65rem;
      font-size: 0.8rem;
    }

    .btn-danger:hover { background: #ef444420; }

    #campaign-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .campaign-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 6px;
      padding: 0.65rem 0.9rem;
    }

    .campaign-id {
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      color: #93c5fd;
    }

    .badge {
      font-size: 0.72rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      background: #1e3a5f;
      color: #93c5fd;
      margin-left: 0.5rem;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #475569;
      font-size: 0.9rem;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #1e2433;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 0.75rem 1.1rem;
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      max-width: 320px;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error { border-color: #ef4444; color: #fca5a5; }
    .toast.success { border-color: #22c55e; color: #86efac; }

    #count-badge {
      display: inline-block;
      background: #1e3a5f;
      color: #93c5fd;
      border-radius: 999px;
      font-size: 0.78rem;
      padding: 0.1rem 0.55rem;
      margin-left: 0.4rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Binom Zone Blocker</h1>
      <p>Manage tracked campaigns. The cron worker will auto-block bot-heavy zones.</p>
    </header>

    <div class="card">
      <h2>Add Campaign</h2>
      <form class="add-form" id="add-form">
        <input
          type="text"
          id="campaign-input"
          placeholder="Campaign ID (e.g. 101)"
          autocomplete="off"
          required
        />
        <button type="submit" class="btn-primary" id="add-btn">Add</button>
      </form>
    </div>

    <div class="card">
      <h2>Tracked Campaigns <span id="count-badge">0</span></h2>
      <div id="campaign-list">
        <div class="empty-state">Loading...</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = '/api';

    async function fetchCampaigns() {
      const res = await fetch(`${API}/campaigns`);
      const data = await res.json();
      return data.campaigns ?? [];
    }

    function renderList(campaigns) {
      const list = document.getElementById('campaign-list');
      const badge = document.getElementById('count-badge');
      badge.textContent = campaigns.length;

      if (campaigns.length === 0) {
        list.innerHTML = '<div class="empty-state">No campaigns tracked yet.</div>';
        return;
      }

      list.innerHTML = campaigns.map((id) => `
        <div class="campaign-item" data-id="${id}">
          <span>
            <span class="campaign-id">${escapeHtml(id)}</span>
            <span class="badge">tracking</span>
          </span>
          <button class="btn-danger" onclick="deleteCampaign('${escapeHtml(id)}')">Remove</button>
        </div>
      `).join('');
    }

    async function deleteCampaign(id) {
      const res = await fetch(`${API}/campaigns/${encodeURIComponent(id)}`, { method: 'DELETE' });
      if (res.ok) {
        showToast(`Campaign ${id} removed`, 'success');
        await load();
      } else {
        const data = await res.json().catch(() => ({}));
        showToast(data.error ?? 'Failed to remove campaign', 'error');
      }
    }

    document.getElementById('add-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('campaign-input');
      const id = input.value.trim();
      if (!id) return;

      const btn = document.getElementById('add-btn');
      btn.disabled = true;

      const res = await fetch(`${API}/campaigns`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });

      btn.disabled = false;

      if (res.status === 201) {
        showToast(`Campaign ${id} added`, 'success');
        input.value = '';
        await load();
      } else if (res.status === 409) {
        showToast(`Campaign ${id} is already tracked`, 'error');
      } else {
        const data = await res.json().catch(() => ({}));
        showToast(data.error ?? 'Failed to add campaign', 'error');
      }
    });

    async function load() {
      try {
        const campaigns = await fetchCampaigns();
        renderList(campaigns);
      } catch {
        document.getElementById('campaign-list').innerHTML =
          '<div class="empty-state" style="color:#ef4444">Could not connect to server.</div>';
      }
    }

    let toastTimer;
    function showToast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    load();
  </script>
</body>
</html>
